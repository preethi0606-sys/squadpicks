<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SquadPicks</title>
<!-- Load Telegram WebApp script FIRST so initDataUnsafe is available -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
(function() {
  try {
    var tg      = window.Telegram && window.Telegram.WebApp;
    var groupId = '';

    // Priority 1: groupId from Telegram start_param (set by buildVoteKeyboard in index.js)
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
      groupId = String(tg.initDataUnsafe.start_param);
    }

    // Priority 2: groupId from URL params (e.g. ?startapp=GROUP_ID or ?groupId=GROUP_ID)
    if (!groupId) {
      var params = new URLSearchParams(location.search);
      groupId = params.get('startapp') || params.get('groupId') || '';
    }

    // Redirect to the Full App dashboard with groupId preserved
    var dest = '/dashboard' + (groupId ? '?groupId=' + encodeURIComponent(groupId) : '');
    window.location.replace(dest);
  } catch(e) {
    window.location.replace('/dashboard');
  }
})();
</script>
</head>
<body style="background:#6B21A8;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:'DM Sans',sans-serif;color:#fff">
  <div style="text-align:center">
    <div style="font-size:40px;margin-bottom:12px">⚡</div>
    <div style="font-size:18px;font-weight:600">Opening SquadPicks...</div>
    <div style="font-size:13px;opacity:.7;margin-top:6px">Your squad. Any plan. One app.</div>
  </div>
</body>
</html>
