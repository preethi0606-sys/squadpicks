<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SquadPicks</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// SquadPicks Mini App — redirects to the Full App for a unified experience.
// The Full App detects Telegram context via the tg-web-app-data header sent by Telegram.
(function() {
  try {
    var tg       = window.Telegram && window.Telegram.WebApp;
    var groupId  = '';
    // Try to get groupId from Telegram start_param
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
      groupId = tg.initDataUnsafe.start_param;
    }
    // Also try URL ?startapp= param
    if (!groupId) {
      var sp = new URLSearchParams(location.search).get('startapp') ||
               new URLSearchParams(location.search).get('groupId');
      if (sp) groupId = sp;
    }
    var dest = '/dashboard' + (groupId ? '?groupId=' + encodeURIComponent(groupId) : '');
    window.location.replace(dest);
  } catch(e) {
    window.location.replace('/dashboard');
  }
})();
</script>
</head>
<body style="background:#6B21A8;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#fff">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:8px">⚡</div>
    <div style="font-size:16px">Opening SquadPicks...</div>
  </div>
</body>
</html>
